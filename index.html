<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Vargas Digital | Diseño Web Profesional</title>
    <style>
      :root {
        --primary: #0066FF !important;
        --background: #FFFFFF !important;
        --foreground: #0F172A !important;
      }
      body { 
        background-color: #FFFFFF !important; 
        color: #0F172A !important; 
        margin: 0;
        font-family: 'Inter', sans-serif;
      }
      h1, h2, h3 { color: #0F172A !important; }
      .bg-primary { background-color: #0066FF !important; }
      .text-primary { color: #0066FF !important; }
      
      /* Forzar botones limpios y modernos */
      button, .btn-primary, a[href*="wa.me"] { 
        background-color: #0066FF !important; 
        color: #FFFFFF !important; 
        border-radius: 50px !important; 
        padding: 12px 24px !important;
        font-weight: 600 !important;
        text-decoration: none !important;
        display: inline-block !important;
        border: none !important;
        transition: transform 0.2s ease !important;
      }
      
      button:hover, a[href*="wa.me"]:hover {
        transform: translateY(-2px) !important;
        box-shadow: 0 4px 12px rgba(0, 102, 255, 0.2) !important;
      }

      /* Secciones limpias */
      section {
        padding: 80px 20px !important;
        background-color: #FFFFFF !important;
      }
      
      .bg-secondary {
        background-color: #F8FAFC !important;
      }
    </style>    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
